name: CD

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  IMAGE_REPO: jongseoh/kwcapstone

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image tag
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Image tag: dev-${GITHUB_SHA::7}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:dev
            ${{ env.IMAGE_REPO }}:dev-${{ steps.vars.outputs.short_sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_REPO: jongseoh/kwcapstone
          APP_IMAGE_TAG: dev-${{ needs.build-and-push.outputs.short_sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_REPO,APP_IMAGE_TAG
          script: |
            set -e

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            cd /opt/kwcapstone-Server

            git fetch origin
            git checkout develop
            git pull origin develop

            chmod +x scripts/bg-rollout.sh

            IMAGE_REPO="$IMAGE_REPO" APP_IMAGE_TAG="$APP_IMAGE_TAG" ./scripts/bg-rollout.sh --keep-old

            docker image prune -f